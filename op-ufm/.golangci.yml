version: "2"

linters:
  enable:
    - sqlclosecheck
    - bodyclose
    - asciicheck
    - misspell
    - errorlint
  settings:
    staticcheck:
      checks: ["all"]
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - text: "errors\\.As"
        linters:
          - errorlint
      - text: "errors\\.Is"
        linters:
          - errorlint
      - path: "pkg/provider/roundtrip.go"
        linters:
          - staticcheck
        text: "SA4006"

formatters:
  enable:
    - goimports

run:
  timeout: 5m
