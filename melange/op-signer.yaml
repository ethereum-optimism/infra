package:
  name: op-signer
  version: "0.0.0"
  epoch: 0
  description: op-signer — OP Stack transaction signer
  copyright:
    - license: MIT

environment:
  contents:
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    repositories:
      - https://packages.wolfi.dev/os
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "1"

pipeline:
  - uses: go/build
    with:
      modroot: op-signer
      packages: ./cmd
      output: op-signer
      go-package: go-1.26
      ldflags: -s -w

  - uses: app-compat/install-to-app
    with:
      binary-name: op-signer

  - uses: strip
