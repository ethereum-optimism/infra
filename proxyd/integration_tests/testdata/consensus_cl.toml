[server]

rpc_port = 8545

[backend]
response_timeout_seconds = 1
max_degraded_latency_threshold = "30ms"

[backends]
[backends.node1]
rpc_url = "$NODE1_URL"

[backends.node2]
rpc_url = "$NODE2_URL"

[backends.node3]
rpc_url = "$NODE3_URL"

[backend_groups]
[backend_groups.node]
backends = ["node1", "node2", "node3"]
routing_strategy = "consensus_aware_consensus_layer"
consensus_handler = "noop" # allow more control over the consensus poller for tests
consensus_ban_period = "1m"
consensus_poller_interval = "5s"
consensus_max_update_threshold = "2m"
consensus_max_block_lag = 8
consensus_min_peer_count = 4

[rpc_method_mappings]
optimism_syncStatus = "node"
