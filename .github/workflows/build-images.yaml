name: build images

on:
  push:
    branches:
      - 'main'
    tags:
      - '*/v*' # Match tags like proxyd/v1.2.3
      - 'v*'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix_json: ${{ steps.plan.outputs.matrix_json }}
      groups_matrix_json: ${{ steps.plan.outputs.groups_matrix_json }}
      has_builds: ${{ steps.plan.outputs.has_builds }}
      has_group_builds: ${{ steps.plan.outputs.has_group_builds }}
    steps:
      - name: Checkout
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v6
        with:
          fetch-depth: 0
      - name: Plan
        id: plan
        uses: ethereum-optimism/factory/actions/plan@d1304a6e3ef93a8fcb0f672707f5f2ae9737a59d

  docker:
    needs: [plan]
    if: needs.plan.outputs.has_builds == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix_json) }}
    uses: ethereum-optimism/factory/.github/workflows/docker.yaml@d1304a6e3ef93a8fcb0f672707f5f2ae9737a59d
    with:
      image_name: ${{ matrix.image_name }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      gcp_project_id: ${{ vars.GCP_PROJECT_ID_OPLABS_TOOLS_ARTIFACTS }}
      registry: us-docker.pkg.dev/oplabs-tools-artifacts/images
    permissions:
      contents: read
      id-token: write
      attestations: write

  apko:
    needs: [plan]
    if: needs.plan.outputs.has_group_builds == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.groups_matrix_json) }}
    uses: ethereum-optimism/factory/.github/workflows/apko.yaml@d1304a6e3ef93a8fcb0f672707f5f2ae9737a59d
    with:
      name: ${{ matrix.group_name }}
      melange_config: ${{ matrix.melange_config }}
      melange_workdir: ${{ matrix.melange_workdir || '' }}
      apko_config_dir: ${{ matrix.apko_config_dir }}
      services: ${{ join(matrix.services, ' ') }}
      smoke_test: ${{ join(matrix.smoke_test, ' ') }}
      registry: us-docker.pkg.dev/oplabs-tools-artifacts/images
      gcp_project_id: ${{ vars.GCP_PROJECT_ID_OPLABS_TOOLS_ARTIFACTS }}
    permissions:
      contents: read
      id-token: write
      attestations: write
  # No fork-PR variant for apko: factory/.github/workflows/apko.yaml's nested
  # jobs unconditionally request id-token: write and attestations: write, which
  # the workflow validator refuses on fork-originating runs.
