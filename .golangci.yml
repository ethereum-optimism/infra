version: "2"

linters:
  enable:
    - sqlclosecheck
    - bodyclose
    - asciicheck
    - misspell
    - errorlint
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - text: "errors\\.As"
      - text: "errors\\.Is"

formatters:
  enable:
    - goimports

run:
  timeout: 5m
